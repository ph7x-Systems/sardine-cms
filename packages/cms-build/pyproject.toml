[project]
name = "cms-build"
version = "0.1.0"
description = "Deterministic static site generator for Stillsite"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["cms-core", "cms-validation"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_build"]
